name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Deploy Convex and build frontend
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          VITE_TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
          VITE_STREAM_API_URL: ${{ vars.VITE_STREAM_API_URL || '/stream-api' }}
          VITE_STREAM_API_KEY: ${{ secrets.VITE_STREAM_API_KEY }}
        run: bunx convex deploy --cmd 'bun run build' --cmd-url-env-var-name VITE_CONVEX_URL

      - name: Publish frontend to server
        uses: burnett01/rsync-deployments@7.0.2
        with:
          switches: -avzr --delete
          path: dist/
          remote_path: ${{ vars.PROD_WEB_ROOT || '/var/www/jedflix' }}
          remote_host: ${{ secrets.PROD_SSH_HOST }}
          remote_user: ${{ secrets.PROD_SSH_USER }}
          remote_key: ${{ secrets.PROD_SSH_KEY }}

      - name: Deploy stream server
        uses: appleboy/ssh-action@v1.2.0
        env:
          PROD_APP_DIR: ${{ vars.PROD_APP_DIR || '/opt/jedflix' }}
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: PROD_APP_DIR
          script: |
            set -euo pipefail
            cd "${PROD_APP_DIR}"
            git fetch origin main
            git reset --hard origin/main
            chmod +x scripts/deploy-stream-server.sh
            ./scripts/deploy-stream-server.sh
